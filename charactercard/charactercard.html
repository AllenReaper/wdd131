<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Card</title>
    <link rel="stylesheet" href="charactercard.css">
    <script src="charactercard.js" defer></script>
</head>
<body>
    
    <div class="card">
        <img class="image" src="goingtowar.png" alt="Beaver King">

        <div class="name">LORD JOSH </div>

        <div class="stats">
            <p><strong>Class:</strong> KING OF THE BEAVERS</p>
            <p><strong>Level:</strong> <span id="level-value">999999999999999999</span></p>
            <p><strong>Health:</strong> <span id="health-value">999</span></p>
        </div>

        <div class="buttons">
            <button id="attack-butten">Attacked</button>
            <button id="levelup-butten">Level Up</button>
        </div>
    </div>

</body>
</html>
