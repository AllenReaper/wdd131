<!DOCTYPE html>
<html lang="en">
<head>
    
    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Your Title">
    <meta property="og:description" content="Your Description">
    <meta property="og:url" content="Your URL">
    <meta property="og:image" content="social-preview-image.png">

    <!-- X Card -->
    <meta name="twitter:card" content="Social Preview Image">
    <meta name="twitter:title" content="Your Title">
    <meta name="twitter:description" content="Your Description">
    <meta name="twitter:image" content="social-preview-image.png">

    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="/favicon.ico">

    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
                
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="resipebook.css">          
    <title>Resipe Bood</title>
</head>
<body>
    <header class="logo-header">
        <img id="resbook" src="images/recipe-book.png" alt="recipe book icon">
        <h1>RecipeBook</h1>
    </header>
    
    <div class="searchB">
        <input type="text" placeholder="Search.."> 
    </div>
    <section class="resipe_sec">
            
        <img src="images/apple-crisp.jpg" alt="pie in a bowl"> 
        <div class="recipe-text-container">
                
                <button class="btn default">Dessert</button>
                
                <h3>Apple Crisp</h3>
                <span
                class="rating"
                role="img"
                aria-label="Rating: 4 out of 5 stars"
                >
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star-empty">☆</span>
            </span>
            <div class="media-card-content">
                <p>A paragraph with  more information about the topic mentioned in the heading.</p>
            </div>
        </div>
        
    
    </section>




<div class="social">

    <a href="#"><img src="https://wddbyui.github.io/wdd131/images/recipe1/pinterest_icon.svg" alt="pinterest icon"></a>
</div>
